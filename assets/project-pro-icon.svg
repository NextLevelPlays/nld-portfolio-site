<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Project Pro icon</title>
  <desc id="desc">Dark app icon with cyan and green blueprint grid and stylized PP monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a2b"/>
      <stop offset="100%" stop-color="#060b13"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dffb2"/>
      <stop offset="100%" stop-color="#32d8ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="44" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="44" fill="none" stroke="#1d3550" stroke-width="2"/>
  <g opacity="0.22" stroke="#32d8ff" stroke-width="2">
    <path d="M48 72H208"/>
    <path d="M48 112H208"/>
    <path d="M48 152H208"/>
    <path d="M48 192H208"/>
    <path d="M72 48V208"/>
    <path d="M112 48V208"/>
    <path d="M152 48V208"/>
    <path d="M192 48V208"/>
  </g>
  <g filter="url(#glow)" fill="none" stroke="url(#stroke)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M78 182V72h56c20 0 34 12 34 31s-14 31-34 31H78" stroke-width="14"/>
    <path d="M126 182V72h42c20 0 34 12 34 31s-14 31-34 31h-42" stroke-width="14" opacity="0.92"/>
    <path d="M78 103h60" stroke-width="10" opacity="0.85"/>
    <path d="M126 103h54" stroke-width="10" opacity="0.85"/>
  </g>
  <g fill="#32d8ff" opacity="0.95">
    <circle cx="72" cy="72" r="5"/>
    <circle cx="192" cy="72" r="5"/>
    <circle cx="72" cy="192" r="5"/>
    <circle cx="192" cy="192" r="5"/>
