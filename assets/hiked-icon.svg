<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">HIKED icon</title>
  <desc id="desc">Dark app icon with cyan and green mountain trail and waypoint motif for HIKED.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a2b"/>
      <stop offset="100%" stop-color="#060b13"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dffb2"/>
      <stop offset="100%" stop-color="#32d8ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="44" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="44" fill="none" stroke="#1d3550" stroke-width="2"/>
  <g opacity="0.18" stroke="#32d8ff" stroke-width="2">
    <path d="M56 196C88 172 116 164 152 164s42 12 48 18" fill="none"/>
    <path d="M60 58l18 16 22-12 18 15 20-11 17 14 22-12 20 16" fill="none"/>
  </g>
  <g filter="url(#glow)" fill="none" stroke="url(#stroke)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 178l46-56 30 30 44-64 40 90" stroke-width="14"/>
    <path d="M74 191c18-22 38-35 60-39 20-4 37-1 50 8" stroke-width="10" opacity="0.95"/>
    <path d="M173 76l21 21-21 21" stroke-width="10"/>
    <path d="M194 97h-38" stroke-width="10"/>
  </g>
  <g fill="#32d8ff">
    <circle cx="94" cy="122" r="6"/>
    <circle cx="124" cy="152" r="6"/>
    <circle cx="168" cy="88" r="6"/>
    <circle cx="208" cy="178" r="6"/>
  </g>
</svg>
